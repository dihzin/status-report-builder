async function exportPNG() {
  try {
    const sideHeader = document.getElementById('side-header');
    const chartHeader = document.getElementById('chart-header');
    const timelineSvg = document.getElementById('timeline-svg');
    const headerSvg = chartHeader.querySelector('svg');
    const sideW = sideHeader.offsetWidth;
    const chartW = +timelineSvg.getAttribute('width');
    const headerH = 56;
    const bodyH = +timelineSvg.getAttribute('height');
    const totalW = sideW + chartW;
    const totalH = headerH + bodyH;
    const canvas = document.createElement('canvas');
    canvas.width = totalW; canvas.height = totalH;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, totalW, totalH);

    const tlImg = await svgToImage(timelineSvg, chartW, bodyH);
    ctx.drawImage(tlImg, sideW, headerH);
    const hdImg = await svgToImage(headerSvg, chartW, headerH);
    ctx.drawImage(hdImg, sideW, 0);
    await drawSidePanelToCanvas(ctx, sideW, totalH);

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'gantt-chart.png';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast(t('toast_png_exported'), 'success');
    });
  } catch (err) { console.error(err); toast(t('toast_png_failed') + ': ' + err.message, 'error'); }
}
function svgToImage(svg, w, h) {
  return new Promise((res, rej) => {
    const clone = svg.cloneNode(true);
    inlineStyles(clone);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    clone.setAttribute('width', w);
    clone.setAttribute('height', h);
    const xml = new XMLSerializer().serializeToString(clone);
    const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); res(img); };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('SVG render failed')); };
    img.src = url;
  });
}
function inlineStyles(svg) {
  const colors = {
    '--phase-bar': getCssVar('--phase-bar') || '#475569',
    '--very-high': getCssVar('--very-high') || '#b91c1c',
    '--high': getCssVar('--high') || '#ea580c',
    '--medium': getCssVar('--medium') || '#ca8a04',
    '--low': getCssVar('--low') || '#16a34a',
    '--primary': getCssVar('--primary') || '#2563eb',
    '--text-muted': '#6b7280', '--text': '#1f2430',
    '--grid-line': '#eef0f3', '--grid-line-strong': '#d8dce2',
    '--border': '#e3e6eb', '--danger': '#dc2626',
  };
  const replaceVars = el => {
    for (const attr of ['fill','stroke']) {
      const v = el.getAttribute(attr);
      if (v && v.startsWith('var(')) {
        const m = v.match(/var\((--[\w-]+)\)/);
        if (m && colors[m[1]]) el.setAttribute(attr, colors[m[1]]);
      }
    }
    if (el.classList) {
      if (el.classList.contains('row-band') && el.classList.contains('phase')) el.setAttribute('fill', '#eef2f7');
      if (el.classList.contains('weekend-band')) el.setAttribute('fill','#f3f4f6');
      if (el.classList.contains('gridline-day')) { el.setAttribute('stroke','#eef0f3'); el.setAttribute('stroke-width','1'); }
      if (el.classList.contains('gridline-week')) { el.setAttribute('stroke','#d8dce2'); el.setAttribute('stroke-width','1'); }
      if (el.classList.contains('gridline-month')) { el.setAttribute('stroke','#d8dce2'); el.setAttribute('stroke-width','1.4'); }
      if (el.classList.contains('today-line')) { el.setAttribute('stroke','#dc2626'); el.setAttribute('stroke-width','1.5'); el.setAttribute('stroke-dasharray','3,3'); }
      if (el.classList.contains('dep-line')) { el.setAttribute('stroke','#cbd5e1'); el.setAttribute('fill','none'); el.setAttribute('stroke-width','0.9'); }
      if (el.classList.contains('header-tick')) el.setAttribute('fill', el.classList.contains('major') ? '#1f2430' : '#6b7280');
      if (el.classList.contains('bar-label-pct')) { el.setAttribute('fill','#ffffff'); el.setAttribute('stroke','rgba(0,0,0,0.25)'); el.setAttribute('stroke-width','0.5'); }
      if (el.classList.contains('bar-label-name')) el.setAttribute('fill','#1f2430');
    }
    for (const ch of el.children) replaceVars(ch);
  };
  replaceVars(svg);
}
async function drawSidePanelToCanvas(ctx, sideW, totalH) {
  const w = sideW, h = totalH;
  const headerHtml = document.getElementById('side-header').outerHTML;
  const bodyHtml = document.getElementById('side-body').outerHTML;
  const styles = document.querySelector('style').textContent;
  const colTmpl = colTemplate();
  const svgHtml = '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">' +
    '<foreignObject width="100%" height="100%">' +
      '<div xmlns="http://www.w3.org/1999/xhtml" style="--col-template: '+colTmpl+'; width:'+w+'px; height:'+h+'px; font-family: -apple-system, sans-serif; background:#fff;">' +
        '<style>'+styles+'</style>'+headerHtml+bodyHtml +
      '</div>' +
    '</foreignObject>' +
  '</svg>';
  try {
    const blob = new Blob([svgHtml], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
  } catch {
    ctx.fillStyle = '#f7f8fa'; ctx.fillRect(0, 0, w, h);
  }
}
document.getElementById('btn-export-png').addEventListener('click', exportPNG);

function copyJSON() {
  const json = JSON.stringify(state.data, null, 2);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(json).then(
      () => toast(t('toast_json_copied'), 'success'),
      () => fallbackCopy(json)
    );
  } else fallbackCopy(json);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast(t('toast_json_copied'),'success'); }
  catch { toast(t('toast_json_failed'),'error'); }
  document.body.removeChild(ta);
}
document.getElementById('btn-copy-json').addEventListener('click', copyJSON);

function download(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

let toastTimer = null;
function toast(msg, type) {
  type = type || '';
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

(function setupSplitter() {
  const side = document.querySelector('.side');
  let dragging = false, startX = 0, startW = 380;
  side.style.position = 'relative';
  const handle = document.createElement('div');
  handle.style.cssText = 'position:absolute;top:0;right:-3px;width:6px;height:100%;cursor:col-resize;z-index:5';
  side.appendChild(handle);
  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = side.offsetWidth;
    document.body.style.userSelect = 'none';
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    let w = Math.max(160, Math.min(800, startW + (e.clientX - startX)));
    document.documentElement.style.setProperty('--side-w', w + 'px');
  });
  window.addEventListener('mouseup', () => { dragging = false; document.body.style.userSelect = ''; });
})();
